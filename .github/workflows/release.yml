name: Release Extension

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          if [ -z "$latest_tag" ]; then
            echo "version=$(jq -r '.version' manifest.json)" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r major minor patch <<< "$latest_tag"
            echo "version=$major.$minor.$((patch + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' manifest.json > tmp.json
          mv tmp.json manifest.json

      - name: Create extension zip
        run: |
          zip point-and-claude-v${{ steps.version.outputs.version }}.zip \
            manifest.json background.js content.js content.css

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || {
            git commit -m "v${{ steps.version.outputs.version }} [skip ci]"
            git push
          }

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            point-and-claude-v${{ steps.version.outputs.version }}.zip \
            --title "Point & Claude v${{ steps.version.outputs.version }}" \
            --generate-notes
